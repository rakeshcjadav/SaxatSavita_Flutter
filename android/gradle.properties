# Optimized JVM settings for faster builds and heap space fix
org.gradle.jvmargs=-Xmx12G -XX:MaxMetaspaceSize=6G -XX:ReservedCodeCacheSize=1024m -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8 -XX:+UseG1GC -XX:+UseStringDeduplication
android.useAndroidX=true
android.enableJetifier=true

# Build performance optimizations
org.gradle.parallel=true
org.gradle.configureondemand=true
org.gradle.daemon=true
org.gradle.caching=true

# Configure Adoptium JDK 21 (better compatibility with Android Gradle Plugin)
org.gradle.java.home=C:/Users/rakes/AppData/Local/Programs/Eclipse Adoptium/jdk-21.0.9.10-hotspot
kotlin.jvm.target.validation.mode=warning
